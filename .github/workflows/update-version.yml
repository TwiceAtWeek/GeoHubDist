      - name: Generate version.json
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG:  ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          GH_REPO:      ${{ github.repository }}
        run: |
          python3 - << 'EOF'
          import json, subprocess, os, datetime

          tag   = os.environ["RELEASE_TAG"]
          ver   = tag.lstrip("v")
          body  = os.environ.get("RELEASE_BODY", "").strip()
          notes = [line.lstrip("- ").strip() for line in body.splitlines() if line.strip().startswith("-")]
          if not notes:
              notes = [body] if body else [ver]
          repo  = os.environ["GH_REPO"]
          base  = f"https://github.com/{repo}/releases/download/{tag}"
          date  = datetime.date.today().isoformat()

          out = subprocess.check_output(
              ["gh", "release", "view", tag, "--json", "assets", "-q", ".assets[].name"],
              text=True
          )
          assets = [a for a in out.strip().splitlines() if a]
          files  = [{"name": a, "url": f"{base}/{a}"} for a in assets]

          try:
              with open("version.json", encoding="utf-8") as f:
                  old = json.load(f)
              changelog = old.get("changelog", [])
          except Exception:
              changelog = []

          changelog = [e for e in changelog if str(e.get("version", "")) != ver]
          changelog.insert(0, {"version": ver, "date": date, "notes": notes})

          doc = {"version": ver, "files": files, "changelog": changelog}
          with open("version.json", "w", encoding="utf-8") as f:
              json.dump(doc, f, ensure_ascii=False, indent=2)
          print(json.dumps(doc, ensure_ascii=False, indent=2))
          EOF
