name: Update version.json

on:
  release:
    types: [published]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate version.json
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG:  ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          GH_REPO:      ${{ github.repository }}
        run: |
          python3 - << 'EOF'
          import json, subprocess, os

          tag   = os.environ["RELEASE_TAG"]
          ver   = tag.lstrip("v")
          notes = os.environ.get("RELEASE_NAME", ver)
          repo  = os.environ["GH_REPO"]
          base  = f"https://github.com/{repo}/releases/download/{tag}"

          out = subprocess.check_output(
              ["gh", "release", "view", tag, "--json", "assets", "-q", ".assets[].name"],
              text=True
          )
          assets = [a for a in out.strip().splitlines() if a]
          files  = [{"name": a, "url": f"{base}/{a}"} for a in assets]

          doc = {"version": ver, "notes": notes, "files": files}
          with open("version.json", "w", encoding="utf-8") as f:
              json.dump(doc, f, ensure_ascii=False, indent=2)
          print(json.dumps(doc, ensure_ascii=False, indent=2))
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet || git commit -m "release: ${{ github.event.release.tag_name }}"
          git push
